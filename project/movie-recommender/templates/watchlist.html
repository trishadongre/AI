<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container py-4">
        <header class="glass-panel d-flex justify-content-between align-items-center mb-5 px-4 py-3">
            <h3 class="fw-bold mb-0">MY <span class="neon-text">WATCHLIST</span></h3>
            <a href="/dashboard" class="btn btn-outline-light rounded-pill">BACK TO MATRIX</a>
        </header>

        {% if movies %}
        <div class="row g-4">
            {% for m in movies %}
            <div class="col-6 col-md-3">
                <div class="movie-card text-center h-100">
                    <div class="poster-container"><img src="{{ m.poster }}"></div>
                    <div class="p-3">
                        <h6 class="fw-bold text-truncate">{{ m.title }}</h6>
                        <p class="small text-secondary">{{ m.genre }}</p>
                        <a href="/movie/{{ m.title }}" class="btn btn-neon btn-sm w-100">VIEW DETAILS</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-center py-5">
            <h2 class="text-secondary">Your watchlist is currently empty.</h2>
            <p>Explore the matrix to add movies!</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
